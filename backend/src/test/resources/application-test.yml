# ==============================================================================
# SPRING BOOT TEST CONFIGURATION (Profile: test)
# ==============================================================================
# This configuration is used during integration tests to ensure:
# 1. Isolation: Tests run in a volatile, in-memory environment.
# 2. Speed: H2 is significantly faster than a real PostgreSQL instance.
# 3. Reliability: The production database remains untouched.
# ==============================================================================

server:
  port: 0

spring:
  application:
    name: ugerevevue-backend-test

  datasource:
    # Use H2 In-Memory mode.
    # DB_CLOSE_DELAY=-1: Keeps the data alive as long as the JVM/Context is running.
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    # Explicitly use H2 Dialect for Hibernate SQL generation
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

app:
  cors:
    allowed-origins: "http://localhost:3000"

# ==============================================================================
# LOGGING CONFIGURATION
# ==============================================================================
logging:
  level:
    root: WARN
    fr.vpl: DEBUG
    org.springframework: WARN
    org.hibernate.orm.jdbc.bind: WARN
